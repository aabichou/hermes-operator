name: agent-image

on:
  workflow_dispatch:
    inputs:
      hermes_version:
        description: "Upstream hermes-agent release tag (e.g. v2026.5.29.2)"
        required: true
        type: string

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: images/hermes-agent
          file: images/hermes-agent/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/aabichou/hermes-agent:${{ inputs.hermes_version }}
            ghcr.io/aabichou/hermes-agent:latest
          build-args: |
            HERMES_VERSION=${{ inputs.hermes_version }}
